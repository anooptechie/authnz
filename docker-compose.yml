version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
